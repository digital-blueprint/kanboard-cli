version: 2

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: kanboard-cli
    main: .
    binary: kanboard-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/tu-graz/kanboard-cli/internal/version.Version={{.Version}}
      - -X github.com/tu-graz/kanboard-cli/internal/version.Commit={{.Commit}}
      - -X github.com/tu-graz/kanboard-cli/internal/version.Date={{.Date}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README*
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: kanboard-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
