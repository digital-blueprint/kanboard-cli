name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]   # releases are handled by release.yml
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libsecret (required by go-keyring on Linux)
        run: sudo apt-get install -y libsecret-1-dev

      - name: Build
        run: go build -o kanboard-cli .

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
